server {
    listen 80;
    server_name _;

    # Mobile frontend
    location / {
        root /usr/share/nginx/mobile-html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Admin frontend
    location /admin/ {
        alias /usr/share/nginx/admin-html/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    location ^~ /assets/ {
        root /usr/share/nginx/mobile-html;
        expires -1;
        add_header Cache-Control "no-store";
    }

    location ^~ /admin/assets/ {
        alias /usr/share/nginx/admin-html/assets/;
        expires -1;
        add_header Cache-Control "no-store";
    }

    location ^~ /static/ {
        alias /usr/share/nginx/backend-static/;
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Reverse proxy to Node.js API
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://nideshop-api:8360/api/;
        proxy_redirect off;
    }

    # Also proxy admin API routes
    location /admin-api/ {
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Host $http_host;
        proxy_pass http://nideshop-api:8360/admin/;
        proxy_redirect off;
    }
}
